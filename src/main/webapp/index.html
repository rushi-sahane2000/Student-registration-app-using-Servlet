<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Portal</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --text-color: #333;
            --accent-color: #34c759;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Crucial for padding */
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        input[type="submit"] {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 1rem;
        }

        input[type="submit"]:hover {
            background-color: #357abd;
        }

        .view-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .view-link:hover {
            text-decoration: underline;
        }

        /* Responsive tweak */
        @media (max-width: 480px) {
            .container {
                margin: 20px;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 Student Portal</h2>

    <form action="student-registration" method="post">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
            <label for="roll">Roll Number</label>
            <input type="text" id="roll" name="roll" placeholder="Ex: 101" required>
        </div>

        <div class="form-group">
            <label for="course">Select Course</label>
            <select name="course" id="course" required>
                <option value="" disabled selected>Choose a course...</option>
                <option value="java">Java Development</option>
                <option value="python">Python Programming</option>
                <option value="HTML">Web Design (HTML)</option>
                <option value="javascript">JavaScript</option>
            </select>
        </div>

        <div class="form-group">
            <label for="marks">Total Marks</label>
            <input type="number" id="marks" name="marks" placeholder="0-100" min="0" max="100" required>
        </div>

        <input type="submit" value="Register Student">
    </form>

    <a href="students" class="view-link">📋 View All Registered Students</a>
</div>

</body>
</html>
